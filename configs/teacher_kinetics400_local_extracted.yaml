app: rethinking_jepa.teacher_train

data:
  source: real
  manifest: /scratch/sd6701/salt/p-salt/data/kinetics400_subset_2/train_256_manifest.txt
  skip_decode_errors: true
  max_decode_attempts: 32
  log_decode_warnings: true
  frames: 16
  frame_step: 4
  image_size: 256
  input_size: 224

augmentation:
  random_resize_aspect_ratio: [0.75, 1.35]
  random_resize_scale: [0.3, 1.0]

masking:
  strategy: random
  mask_ratio: 0.85
  # V-JEPA block-masking keys (kept for easy revert; ignored when strategy=random):
  # strategy: multiseq_multiblock3d
  # short_spatial_mask_scale: 0.15
  # long_spatial_mask_scale: 0.7
  # temporal_mask_scale: 1.0
  # mask_aspect_ratio: [0.75, 1.5]
  # short_num_blocks: 8
  # long_num_blocks: 2

loss:
  norm_pix_loss: true
  norm_pix_eps: 1.0e-6

model:
  architecture: vit_small
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

optimizer:
  start_lr: 0.0001
  lr: 0.0003
  final_lr: 1.0e-6
  start_weight_decay: 0.05
  end_weight_decay: 0.05
  clip_grad: 0.5
  warmup_steps: 2000
  betas: [0.9, 0.95]

wandb:
  enabled: true
  project: rethinking-jepa
  mode: online
  init_timeout: 180
  fallback_to_offline: true
  name: teacher-vit-small-kinetics400-random85
  tags: [teacher, kinetics400, local, extracted, vit-small]

train:
  device_batch_size: 16
  accumulation_steps: 1
  num_workers: 12
  prefetch_factor: 6
  checkpoint_interval: 10
  log_interval: 10
  debug_steps: 5
  precision: bf16
  steps_per_epoch_scale: 1
  max_steps: 35000
  checkpoint_path: results/checkpoints/teacher_vit_small_kinetics400_local_extracted_subset2.pt
