app: rethinking_jepa.train

data:
  source: real
  root: /scratch/sd6701/salt/p-salt/data/kinetics400_subset_2/videos/kinetics_256/train_256
  max_samples: 500
  sample_seed: 0
  frames: 16
  frame_step: 4
  image_size: 256
  input_size: 224

augmentation:
  random_resize_aspect_ratio: [0.75, 1.35]
  random_resize_scale: [0.3, 1.0]

masking:
  strategy: random
  random_mask_ratio: 0.75
  short_spatial_mask_scale: 0.5
  long_spatial_mask_scale: 0.7
  temporal_mask_scale: 1.0
  mask_aspect_ratio: [0.75, 1.5]

model:
  architecture: vit_h
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

optimizer:
  start_lr: 0.0002
  lr: 0.000625
  final_lr: 1.0e-6
  start_weight_decay: 0.04
  end_weight_decay: 0.4
  clip_grad: 0.02
  warmup_steps: 500
  betas: [0.9, 0.95]

wandb:
  enabled: true
  project: rethinking-jepa
  mode: online
  init_timeout: 180
  fallback_to_offline: true
  name: teacher-vit-h-kinetics400-local-extracted-subset2
  tags: [teacher, kinetics400, local, extracted, vit-h]

train:
  device_batch_size: 16
  num_workers: 12
  prefetch_factor: 6
  checkpoint_interval: 100
  log_interval: 10
  debug_steps: 5
  debug_log_max_paths: 16
  precision: bf16
  steps_per_epoch_scale: 1
  max_steps: 5000
  checkpoint_path: results/checkpoints/teacher_vit_h_kinetics400_local_extracted_subset2.pt
