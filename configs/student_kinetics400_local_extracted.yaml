app: rethinking_jepa.student

data:
  source: real
  manifest: /scratch/sd6701/salt/p-salt/data/kinetics400_subset_2/train_256_manifest.txt
  skip_decode_errors: true
  max_decode_attempts: 32
  log_decode_warnings: true
  frames: 16
  frame_step: 4
  image_size: 256
  input_size: 224

augmentation:
  random_resize_aspect_ratio: [0.75, 1.35]
  random_resize_scale: [0.3, 1.0]

masking:
  strategy: random
  random_mask_ratio: 0.9
  short_spatial_mask_scale: 0.15
  long_spatial_mask_scale: 0.7
  temporal_mask_scale: 1.0
  mask_aspect_ratio: [0.75, 1.5]
  short_num_blocks: 8
  long_num_blocks: 2
  multiblock_profile_sampling: random

model:
  architecture: vit_small
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student_model:
  architecture: vit_small
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student:
  predictor_dim: 384
  predictor_depth: 4
  predictor_heads: 6

optimizer:
  start_lr: 0.0001
  lr: 0.0003
  final_lr: 0.000001
  start_weight_decay: 0.05
  end_weight_decay: 0.05
  clip_grad: 1.0
  warmup_steps: 500
  betas: [0.9, 0.95]

wandb:
  enabled: true
  project: rethinking-jepa
  fallback_to_offline: true
  name: student-vit-small-kinetics400-local-extracted-subset2
  tags: [student, kinetics400, local, extracted, vit-small]

train:
  device_batch_size: 16
  accumulation_steps: 1
  num_workers: 12
  prefetch_factor: 6
  checkpoint_interval: 100
  log_interval: 10
  debug_steps: 5
  precision: bf16
  steps_per_epoch_scale: 1
  max_steps: 10000
  teacher_checkpoint: /scratch/sd6701/salt/p-salt/results/checkpoints/ba0e9395/best/checkpoint.pth
  checkpoint_path: results/checkpoints/student_vit_small_kinetics400_local_extracted_subset2.pth
