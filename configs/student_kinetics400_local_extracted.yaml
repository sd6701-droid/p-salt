app: rethinking_jepa.student

data:
  source: real
  root: /scratch/sd6701/salt/p-salt/data/kinetics400_subset/videos/kinetics_256/train_256
  max_samples: 500
  sample_seed: 0
  frames: 16
  frame_step: 4
  image_size: 256
  input_size: 224

augmentation:
  random_resize_aspect_ratio: [0.75, 1.35]
  random_resize_scale: [0.3, 1.0]

masking:
  short_spatial_mask_scale: 0.15
  long_spatial_mask_scale: 0.7
  temporal_mask_scale: 1.0
  mask_aspect_ratio: [0.75, 1.5]

model:
  architecture: vit_base
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student:
  predictor_dim: 768
  predictor_depth: 4
  predictor_heads: 12

optimizer:
  start_lr: 0.0002
  lr: 0.000625
  final_lr: 0.000001
  start_weight_decay: 0.04
  end_weight_decay: 0.4
  clip_grad: 0.02
  warmup_steps: 10000
  betas: [0.9, 0.95]

wandb:
  enabled: true
  project: rethinking-jepa
  fallback_to_offline: true
  name: student-vit-base-kinetics400-local-extracted
  tags: [student, kinetics400, local, extracted, vit-base]

train:
  device_batch_size: 8
  num_workers: 12
  prefetch_factor: 6
  checkpoint_interval: 100
  log_interval: 10
  precision: bf16
  steps_per_epoch_scale: 1
  max_steps: 5
  teacher_checkpoint: results/checkpoints/teacher_vit_base_kinetics400_local_extracted.pt
  checkpoint_path: results/checkpoints/student_vit_base_kinetics400_local_extracted.pt
