app: rethinking_jepa.eval_probe_student_imagenet

data:
  class_names: []
  frames: 16
  input_size: 224
  resize_size: 256

masking:
  strategy: random
  random_mask_ratio: 0.75
  short_spatial_mask_scale: 0.15
  long_spatial_mask_scale: 0.7
  temporal_mask_scale: 1.0
  mask_aspect_ratio: [0.75, 1.5]

model:
  architecture: vit_tiny
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student_model:
  architecture: vit_large
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student:
  predictor_dim: 1024
  predictor_depth: 8
  predictor_heads: 16

eval:
  val_root: data/imagenet_probe_related_subset/val
  batch_size: 2
  num_workers: 0
  max_val_samples: 20
  sample_seed: 0
  num_visualizations: 20
  student_checkpoint: checkpoints/student_vit_large_from_tiny_teacher_kinetics700_5class_10pct_random.pt
  probe_checkpoint: checkpoints/student_vit_large_pixel_probe_imagenet.pt
  decoder_dim: 768
  decoder_depth: 4
  decoder_heads: 12
  output_dir: evals/student_vit_large_pixel_probe_imagenet_eval

wandb:
  enabled: true
  entity: a-salt
  project: rethinking-jepa
  fallback_to_offline: false
  name: eval-probe-student-vit-large-from-tiny-teacher-imagenet-repeated-frames
  tags: [probe-eval, imagenet, student-vit-large, teacher-vit-tiny, random-mask]
