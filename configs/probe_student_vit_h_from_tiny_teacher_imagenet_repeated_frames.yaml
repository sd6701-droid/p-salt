app: rethinking_jepa.probe_student_imagenet

data:
  class_names: []
  frames: 16
  input_size: 224
  resize_size: 256

masking:
  strategy: random
  random_mask_ratio: 0.75
  short_spatial_mask_scale: 0.15
  long_spatial_mask_scale: 0.7
  temporal_mask_scale: 1.0
  mask_aspect_ratio: [0.75, 1.5]

model:
  architecture: vit_tiny
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student_model:
  architecture: vit_h
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

student:
  predictor_dim: 1280
  predictor_depth: 8
  predictor_heads: 16

probe:
  train_root: data/imagenet_probe_related_subset/train
  val_root: data/imagenet_probe_related_subset/val
  batch_size: 1
  num_workers: 0
  max_train_samples: null
  max_val_samples: null
  sample_seed: 0
  epochs: 10
  max_steps: null
  checkpoint_every_steps: 1000
  eval_every_steps: 1000
  num_visualizations: 8
  decoder_dim: 1024
  decoder_depth: 4
  decoder_heads: 16
  student_checkpoint: results/checkpoints/student_vit_h_from_tiny_teacher_kinetics700_5class_10pct_random.pt
  checkpoint_path: results/checkpoints/student_vit_h_pixel_probe_imagenet.pt
  output_dir: results/evals/student_vit_h_pixel_probe_imagenet

optimizer:
  start_lr: 0.0002
  lr: 0.000625
  final_lr: 0.000001
  start_weight_decay: 0.04
  end_weight_decay: 0.4
  clip_grad: 0.02
  warmup_steps: 100
  betas: [0.9, 0.95]

wandb:
  enabled: true
  entity: a-salt
  project: rethinking-jepa
  fallback_to_offline: false
  name: probe-student-vit-h-from-tiny-teacher-imagenet-repeated-frames
  tags: [probe, imagenet, student-vit-h, teacher-vit-tiny, random-mask]
