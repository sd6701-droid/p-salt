app: rethinking_jepa.train

data:
  source: huggingface
  repo_id: bitmind/Kinetics-700
  config_name: default
  split: train
  video_column: video
  class_names:
    - abseiling
    - air drumming
    - applauding
    - archery
    - arm wrestling
  class_fraction: 0.1
  annotation_csv_url: https://s3.amazonaws.com/kinetics/700_2020/annotations/train.csv
  sample_seed: 0
  shuffle_buffer_size: 512
  decode_threads: 0
  skip_decode_errors: true
  frames: 16
  frame_step: 4
  image_size: 64
  input_size: 224

augmentation:
  random_resize_aspect_ratio: [0.75, 1.35]
  random_resize_scale: [0.3, 1.0]

masking:
  strategy: random
  random_mask_ratio: 0.75
  short_spatial_mask_scale: 0.15
  long_spatial_mask_scale: 0.7
  temporal_mask_scale: 1.0
  mask_aspect_ratio: [0.75, 1.5]

model:
  architecture: vit_large
  in_channels: 3
  tubelet_size: 2
  patch_size: 16

optimizer:
  start_lr: 0.0002
  lr: 0.000625
  final_lr: 0.000001
  start_weight_decay: 0.04
  end_weight_decay: 0.4
  clip_grad: 0.02
  warmup_steps: 400
  betas: [0.9, 0.95]

wandb:
  enabled: true
  entity: a-salt
  project: rethinking-jepa
  fallback_to_offline: false
  name: teacher-vit-large-kinetics700-5class-10pct-random
  tags: [teacher, kinetics700, vit-large, random-mask]

train:
  global_batch_size: 3072
  device_batch_size: 1
  num_workers: 0
  steps_per_epoch_scale: 1
  max_steps: 4000
  checkpoint_path: checkpoints/teacher_vit_large_kinetics700_5class_10pct_random.pt
